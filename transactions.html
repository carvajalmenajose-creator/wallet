<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultimos Movimientos</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
      <link rel="stylesheet" href="assets/css/estilos.css">
   
</head>

<body>

    <head>
        <h2 class="text-center">Últimos Movimientos</h2>
    </head>
    <nav class="navbar navbar-expand-lg  bg-primary ">
        <div class="container-fluid">
            <a class="navbar-brand d-flex flex-column align-items-center" href="#">
                <figure>
                    <img src="assets/img/billetera.png" width="60" alt="">
                </figure>
                <span class="text-light">Wallet ME</span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false"
                aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse bg-black " id="navbarSupportedContent">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0 mx-auto">
                    <li class="nav-item ">
                        <a class="nav-link text-light"><i class="bi bi-piggy-bank text-light fs-3"></i> Depositar</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-light"><i class="bi bi-send-check-fill text-light fs-3"></i> Enviar
                            Dinero</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-light"><i class="bi bi-card-checklist  text-light fs-3"></i> Últimos
                            Movimientos</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    <main>
        <div class="alert alert-success d-none" id="mensaje" role="alert">
            <div class="fs-6">
                <i class="bi bi-exclamation-triangle-fill"></i>
                <span id="tipo_error"></span>
                <i class="bi bi-x-square float-end cursor" role="button" id="cerrar_error"></i>
            </div>
        </div>
        <section class="mt-5">
            <header>
                <a href="menu.html" style="margin-left: 20px;" class=" btn btn-info btn-sm text-white"
                    role="button">Volver al Menú Principal</a>
            </header>
            <div class="card m-auto p-2 my-5">
                <div class="card-body">
                    <table class="table">
                        <thead>
                            <tr>
                                <th scope="col">CBU</th>
                                <th scope="col">Nombre</th>
                                <th scope="col">Alias</th>
                                <th scope="col">Banco</th>
                                <th scope="col">Monto</th>
                            </tr>
                        </thead>
                        <tbody id="tabla">
                        </tbody>
                    </table>
                </div>
            </div>
        </section>

    </main>
    <footer class="bg-primary fixed-bottom">
        <p class="text-light">&copy 2026 - Jose Carvajal Mena</p>
    </footer>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"></script>
    <script src="assets/js/menu.js"></script>
