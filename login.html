<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/css/estilos_login.css">
</head>

<body>

    <main class="container">
        <section class=" mt-5 w-50 m-auto">
            <div class="card ">
                <div class="card-body">
                    <h2 class="card-title text-center mb-3">Iniciar Sesion</h2>
                    <figure class="text-center">
                        <img src="assets/img/billetera.png" width="70" alt="billetera digitar">
                    </figure>
                    <form>
                        <div class="row mb-3">
                            <label for="inputEmail3" class="col-sm-2 col-form-label">Email</label>
                            <div class="col ">
                                <input type="email" required class="form-control" id="email">
                            </div>
                        </div>
                        <div class="row mb-3">
                            <label for="inputPassword3" class="col-sm-2 col-form-label">Contraseña</label>
                            <div class="col">
                                <input type="password" required class="form-control" id="clave">

                            </div>
                        </div>
                    </form>
                    <div class="row mb-3">

                        <div class="col text-center">
                            <button type="submit" class="btn btn-primary" id="btnIniciar">Iniciar sesion</button>
                        </div>
                    </div>

                </div>
            </div>
            <div class="alert alert-danger error_login_hidde mt-3" id="error_login" role="alert">
                <div class="fs-6">
                    <i class="bi bi-exclamation-triangle-fill"></i>
                    <span id="tipo_error"></span>
                    <i class="bi bi-x-square float-end cursor" role="button" id="cerrar_error"></i>
                </div>
            </div>
        </section>
    </main>
    <script src="https://code.jquery.com/jquery-4.0.0.min.js" integrity="sha256-OaVG6prZf4v69dPg6PhVattBXkcOWQB62pdZ3ORyrao=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.min.js"></script>
    <script src="assets/js/login.js"></script>
</body>

</html>
